<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>System Lock</title>
  <style>
    :root {
      --danger: #ef4444;
      --warning: #f59e0b;
      --text: #f9fafb;
      --muted: #cbd5e1;
    }

    * {
      box-sizing: border-box;
      user-select: none;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: #050505;
      color: var(--text);
      overflow: hidden;
      cursor: none;
    }

    body {
      background:
        radial-gradient(circle at top, rgba(239, 68, 68, 0.18), transparent 35%),
        linear-gradient(135deg, #050505, #111827 55%, #1f0505);
      animation: pulse 1.4s infinite alternate;
    }

    @keyframes pulse {
      from { filter: brightness(0.86); }
      to { filter: brightness(1.08); }
    }

    .screen {
      min-height: 100vh;
      width: 100vw;
      padding: 24px;
      display: grid;
      place-items: center;
    }

    .panel {
      width: min(1050px, 100%);
      min-height: calc(100vh - 48px);
      border: 4px solid var(--danger);
      border-radius: 22px;
      padding: clamp(22px, 4vw, 52px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      text-align: center;
      background: rgba(0, 0, 0, 0.48);
      box-shadow:
        inset 0 0 90px rgba(239, 68, 68, 0.12),
        0 0 70px rgba(239, 68, 68, 0.28);
      animation: shake 0.18s linear 7;
    }

    @keyframes shake {
      0% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      50% { transform: translateX(8px); }
      75% { transform: translateX(-5px); }
      100% { transform: translateX(0); }
    }

    .icon {
      font-size: clamp(68px, 10vw, 130px);
      line-height: 1;
      margin-bottom: 12px;
      text-shadow: 0 0 35px rgba(239, 68, 68, 0.75);
    }

    h1 {
      margin: 0 0 12px;
      color: var(--danger);
      text-transform: uppercase;
      font-size: clamp(42px, 8vw, 96px);
      letter-spacing: 2px;
      text-shadow: 0 0 30px rgba(239, 68, 68, 0.75);
    }

    .subtitle {
      font-size: clamp(20px, 3.3vw, 36px);
      font-weight: 900;
      margin-bottom: 26px;
    }

    .box {
      width: min(820px, 100%);
      margin: 0 auto;
      text-align: left;
      background: rgba(255, 255, 255, 0.065);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 18px;
      padding: clamp(16px, 3vw, 24px);
      color: #e5e7eb;
      font-size: clamp(16px, 2.2vw, 22px);
      line-height: 1.75;
    }

    .box strong {
      color: var(--warning);
    }

    .hint {
      margin-top: 28px;
      color: var(--muted);
      font-size: clamp(13px, 1.8vw, 17px);
      opacity: 0.72;
    }

    .exit-hint {
      position: fixed;
      right: 14px;
      bottom: 10px;
      color: rgba(255,255,255,0.16);
      font-size: 12px;
      cursor: default;
    }
  </style>
</head>
<body>
  <main class="screen">
    <section class="panel">
      <div class="icon">🚫</div>
      <h1>Заблокировано</h1>
      <div class="subtitle">Доступ к устройству временно ограничен</div>

      <div class="box">
        <div><strong>Причина:</strong> просмотр запрещённого контента</div>
        <div><strong>Статус:</strong> активирована защитная блокировка</div>
        <div><strong>Проверка:</strong> автоматический анализ активности</div>
      </div>

      <div class="hint">Не закрывайте страницу до завершения проверки.</div>
    </section>
  </main>

  <div class="exit-hint">Esc</div>

  <script>
    async function fullscreen() {
      try {
        if (!document.fullscreenElement && document.documentElement.requestFullscreen) {
          await document.documentElement.requestFullscreen();
        }
      } catch (e) {}
    }

    fullscreen();

    ['click', 'touchstart', 'keydown', 'mousemove'].forEach(eventName => {
      window.addEventListener(eventName, fullscreen, { once: true });
    });
  </script>
</body>
</html>
